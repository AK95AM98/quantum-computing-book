site_name: "Quantum Computing: From Qubits to Business Value"
site_description: "A technical and strategic guide for graduate students, technology strategists, and enterprise leaders navigating the quantum computing revolution."
site_author: "Prof. Sharat Batra, University of Minnesota"
repo_name: "GitHub Repo"
site_url: "https://AK95AM98.github.io/quantum-computing-book/"
repo_url: "https://github.com/AK95AM98/quantum-computing-book"
edit_uri: "edit/main/docs/"
copyright: "© 2026 Prof. Sharat Batra, University of Minnesota"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - md_in_html
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true

extra_javascript:
  - js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/extra.css

extra:
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AK95AM98/quantum-computing-book

